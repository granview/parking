<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="駐車場">
    <meta name="theme-color" content="#f0f2f5">
    <title>駐車場管理システム</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
    <link class="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="駐車場">
    <link class="icon" type="image/png" href="favicon.png">

    <style>
        body {
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 10px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== macOS 26 Liquid Glass style ===== */
        .date-controls {
            width: 98vw;
            max-width: 1500px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 4px;
            box-sizing: border-box;
            margin-bottom: 22px;
        }

        .date-controls-left { display: flex; align-items: center; }

        .date-center-group {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }

        /* Khung ngày — liquid glass */
        .date-box {
            background: #ffffff;
            border: 0.5px solid rgba(0,0,0,0.12);
            border-radius: 14px;
            padding: 14px 18px;
            box-shadow: none;
            display: flex;
            align-items: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .date-box:hover {
            background: rgba(0,122,255,0.10);
            border-color: rgba(0,122,255,0.35);
        }

        .date-box input[type="date"] {
            font-size: 28px;
            font-weight: 300;
            color: #1d1d1f;
            border: none;
            outline: none;
            background: transparent;
            padding: 0;
            letter-spacing: 0.5px;
            cursor: pointer;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }
            cursor: pointer;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }

        .date-box input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.3;
            cursor: pointer;
        }

        /* Nút ◀ ▶ — macOS capsule, hover xanh */
        .btn-nav {
            height: 44px;
            width: 44px;
            border: 0.5px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            background: #ffffff;
            color: #1d1d1f;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
            box-shadow: none;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nav:hover  { background: rgba(0,122,255,0.12); border-color: rgba(0,122,255,0.35); color: #007aff; }
        .btn-nav:active { background: rgba(0,122,255,0.22); }

        /* EXCEL + 更新 */
        .date-side-actions {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: flex-end;
        }

        .btn-side {
            height: 26px;
            padding: 0 11px;
            border: 0.5px solid rgba(0,0,0,0.12);
            border-radius: 7px;
            background: #ffffff;
            color: #1d1d1f;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: none;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }
        .btn-side:hover  { background: rgba(0,0,0,0.06); }
        .btn-side:active { background: rgba(0,0,0,0.11); }

        .parking-lot-map {
            position: relative;
            background: #ffffff;
            border: 2px solid #34495e;
            border-radius: 12px;
            box-shadow: none;
            width: 98vw;
            max-width: 1500px;
            padding: 25px;
            box-sizing: border-box;
            min-height: unset;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .grid-container {
            display: grid;
            gap: 5px;
            grid-template-rows: 140px 0px 80px 80px 200px;
            grid-template-columns: repeat(3, 1fr) 0.5fr repeat(15, 1fr);
            width: 100%;
            flex: 1;
            align-content: space-between;
        }

        .top-row-spot {
            grid-row: 1;
            height: 100%;
        }

        #spot-5, #spot-6, #spot-7, #spot-8, #spot-9 {
            height: 200px !important;
            align-self: start;
        }

        #spot-19,
        #spot-20,
        #spot-21 {
            grid-row: 5;
            height: 100%;
        }

        .short-rect {
            grid-row: 1 / span 3;
            height: 100%;
        }

        #spot-5,
        #spot-6,
        #spot-7,
        #spot-8,
        #spot-9 {
            grid-row: 1;
            height: 100%;
        }

        .parking-spot {
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
            padding: 0;
            position: relative;
            overflow: hidden;
            touch-action: none;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #bdc3c7 !important;
        }

        .parking-spot {
            background: #2ecc71;
            border: 1.5px solid #27ae60 !important;
        }

        .parking-spot.booked {
            background: #e74c3c !important;
            border: 1.5px solid #c0392b !important;
        }

        .parking-spot.staff {
            background: #f39c12 !important;
            border: 1.5px solid #d35400 !important;
        }

        .parking-spot.handicapped {
            background: #2980b9 !important;
            border: 1.5px solid #1f618d !important;
        }

        /* Ô số 4 (handicapped) khi có khách → đỏ */
        .parking-spot.handicapped.booked {
            background: #e74c3c !important;
            border: 1.5px solid #c0392b !important;
        }

        .parking-spot.dragging {
            opacity: 0.3;
            transform: scale(0.95);
            border: 1.5px dashed #2c3e50 !important;
        }

        .parking-spot.drag-over {
            border: 1.5px dashed #1d4ed8 !important;
            background-color: #dbeafe !important;
        }

        /* Khung chữ trắng — chiều cao = toàn ô trừ header 28px cố định */
        .name-display {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 42px);
            background: rgba(255, 255, 255, 0.76) !important;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
            pointer-events: none;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px 2px;
        }

        .spot-content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            z-index: 2;
            pointer-events: none;
        }

        /* Số ô — chiều cao cố định 28px, không phụ thuộc % */
        .spot-num-header {
            font-size: 22px !important;
            font-weight: 700 !important;
            color: #ffffff !important;
            height: 42px !important;
            min-height: 42px !important;
            max-height: 42px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 0;
            line-height: 1;
            box-sizing: border-box;
            text-shadow: none;
            flex-shrink: 0;
        }

        /* ================= KHUNG CHỮ DỌC TỰ CO ================= */
        .text-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden;
            padding: 3px 2px;
            font-weight: 400 !important;
            color: #111111 !important;
            text-align: center;
            line-height: 1.1;
        }

        .text-content-wrapper .text-inner {
            display: block;
            white-space: nowrap;
            text-align: center;
            line-height: 1.1;
            width: 100%;
        }

        .text-content-wrapper .char-dash {
            display: inline-block;
            color: #111111;
            line-height: 1.1;
            margin: 3px 0;
            transform: rotate(90deg);
            font-size: 0.5em;
        }

        .note-star {
            font-size: 18px;
            color: #e74c3c;
            position: absolute;
            bottom: 3px;
            right: 3px;
            left: auto;
            transform: none;
            display: none;
            z-index: 10;
        }

        .hatched-zone {
            grid-column: 4 / span 1;
            grid-row: 1 / span 3;
            background-image: repeating-linear-gradient(45deg, #f9f9f9, #f9f9f9 6px, #e0e0e0 6px, #e0e0e0 12px);
            border: 1px solid #bdc3c7;
            border-radius: 4px;
        }

        #spot-1 {
            grid-column: 1;
        }

        #spot-2 {
            grid-column: 2;
        }

        #spot-3 {
            grid-column: 3;
        }

        #spot-4 {
            grid-column: 5 / span 1;
            grid-row: 1 / span 3;
        }

        #spot-5 {
            grid-column: 6;
        }

        #spot-6 {
            grid-column: 7;
        }

        #spot-7 {
            grid-column: 8;
        }

        #spot-8 {
            grid-column: 9;
        }

        #spot-9 {
            grid-column: 10;
        }

        .main-road {
            grid-row: 4;
            grid-column: 1 / span 19;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            height: 100%;
        }

        #spot-21 {
            grid-row: 5;
            grid-column: 17;
        }

        #spot-20 {
            grid-row: 5;
            grid-column: 18;
        }

        #spot-19 {
            grid-row: 5;
            grid-column: 19;
        }

        .legend {
            margin-top: 20px;
            display: flex;
            gap: 35px;
            padding: 15px 35px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 400;
            color: #2c3e50;
        }

        .color-box {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        /* Định dạng bảng danh sách gốc ban đầu */
        .customer-list-container {
            width: 98vw;
            max-width: 1500px;
            margin-top: 25px;
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: none;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .list-title-center {
            font-weight: bold;
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .excel-table th {
            background-color: #3498db !important;
            color: #ffffff !important;
            font-weight: bold;
            font-size: 17px;
            padding: 14px 10px;
            border: 1px solid #2980b9;
        }

        .excel-table td {
            border: 1px solid #ddd;
            padding: 14px 10px;
            text-align: center;
            font-size: 18px;
            font-weight: normal;
            color: initial;
            transition: background-color 0.2s, color 0.2s;
        }

        .excel-table tbody tr:nth-child(even) {
            background-color: #ffffff;
        }

        .excel-table tbody tr:nth-child(odd) {
            background-color: #f1f5f9;
        }

        .excel-table tbody tr.row-checked {
            background-color: #fca5a5 !important;
        }

        .excel-table tbody tr.row-checked td {
            color: #991b1b !important;
            font-weight: bold;
        }

        .excel-table tbody tr.row-checked .col-car-number {
            color: #7f1d1d !important;
        }

        /* 台数 — đậm to hơn */
        .col-stt {
            font-weight: bold !important;
            font-size: 20px !important;
            color: #1a1a1a !important;
        }

        .col-room-number {
            font-weight: normal;
            color: #333333;
        }

        .col-guest-name {
            width: 180px;
            white-space: nowrap;
            text-align: left !important;
            padding-left: 15px !important;
        }

        /* 車番号 — đậm to, màu xanh dương */
        .col-car-number {
            font-weight: bold !important;
            color: #1a6ddb !important;
            font-size: 22px !important;
        }

        .check-col {
            width: 45px;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #e74c3c;
        }

        .btn-header-clear {
            background: #ffffff !important;
            color: #e74c3c !important;
            border: 1.5px solid #e74c3c !important;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: none;
            transition: all 0.2s ease;
        }

        .btn-header-clear:hover {
            background: #fdedec !important;
            color: #c0392b !important;
            border-color: #c0392b !important;
        }

        .status-circle {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 26px;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            box-sizing: border-box;
        }

        .status-circle.seisan-zai {
            border: 2px solid #2ecc71;
            color: #2ecc71;
            background-color: #eafaf1;
        }

        .status-circle.seisan-mi {
            border: 2px solid #e74c3c;
            color: #e74c3c;
            background-color: #fdedec;
        }

        .seisan-toggle-btn {
            width: 60px;
            height: 60px;
            line-height: 56px;
            border-radius: 50%;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #2ecc71;
            color: #2ecc71;
            background: #eafaf1;
            user-select: none;
            margin: 0 auto;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .seisan-toggle-btn.unpaid {
            border-color: #e74c3c;
            color: #e74c3c;
            background: #fdedec;
        }

        #guestModal,
        #staffModal,
        #passModal,
        #confirmModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }

        .modal-box {
            background: #ffffff;
            width: 620px;
            max-width: 95vw;
            max-height: 95vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: 30px 35px;
            box-sizing: border-box;
            box-shadow: none;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 22px;
            text-align: center;
            color: #2c3e50;
        }

        .form-row {
            display: flex;
            gap: 14px;
            margin-bottom: 14px;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            color: #888;
            margin-bottom: 7px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 17px;
            background-color: #fcfcfc;
            box-sizing: border-box;
            color: #333;
        }

        /* 部屋番号 */
        .form-group.room-small {
            flex: 0 0 100px;
        }
        .form-group.room-small input {
            font-size: 17px;
            padding: 0 8px;
            text-align: center;
            height: 54px;
            box-sizing: border-box;
        }

        /* お客様名 */
        #guestName {
            font-size: 20px !important;
            font-weight: 500 !important;
            height: 54px !important;
            padding: 0 14px !important;
            box-sizing: border-box !important;
        }

        /* 泊数 */
        .form-group.stay-small {
            flex: 0 0 80px;
        }
        .form-group.stay-small select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            text-align: center;
            padding: 14px 4px;
            font-size: 17px;
            cursor: pointer;
            background-image: none;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-buttons button {
            flex: 1;
            border: none;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
        }

        .btn-save {
            background: #2ecc71;
            color: white;
        }

        .btn-close {
            background: #95a5a6;
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        @media (max-width: 768px) {
            .parking-lot-map {
                min-height: auto;
                padding: 10px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .grid-container {
                grid-template-columns: repeat(19, minmax(60px, 1fr));
                gap: 5px;
                min-width: 1200px;
            }

            .date-controls {
                flex-wrap: nowrap;
            }
        }
    </style>
</head>

<body>

    <div id="toast"
        style="position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 14px 35px; border-radius: 50px; transition: top .5s ease; z-index: 2000; font-size: 16px; font-weight: bold; display: none;">
    </div>

    <div class="date-controls">
        <div class="date-controls-left"></div>
        <div class="date-center-group">
            <button class="btn-nav" onclick="changeDate(-1)">◀</button>
            <div class="date-box">
                <input type="date" id="parkingDate" onchange="handleDateChange()">
            </div>
            <button class="btn-nav" onclick="changeDate(1)">▶</button>
        </div>
        <div class="date-side-actions">
            <button onclick="exportToExcel()" class="btn-side">EXCEL</button>
            <button onclick="refreshData()" class="btn-side">🔄 更新</button>
        </div>
    </div>

    <div class="parking-lot-map">
        <div class="grid-container" id="parkingGrid"></div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="color-box" style="background:#2ecc71;"></div>空き
        </div>
        <div class="legend-item">
            <div class="color-box" style="background:#e74c3c;"></div>予約済
        </div>
        <div class="legend-item">
            <div class="color-box" style="background:#f39c12;"></div>スタッフ用&予備
        </div>
        <div class="legend-item">
            <div class="color-box" style="background:#3498db;"></div>身障者用
        </div>
    </div>

    <div class="customer-list-container">
        <div class="list-title-center">駐車場管理表</div>
        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width: 95px; background-color: #2980b9 !important;">
                        <button class="btn-header-clear" onclick="clearAllRowChecks()">❌ 解除</button>
                    </th>
                    <th style="width: 70px;">台数</th>
                    <th style="width: 100px;">部屋番号</th>
                    <th class="col-guest-name">お客様名</th>
                    <th style="width: 130px;">車番</th>
                    <th style="width: 120px;">利用開始日</th>
                    <th style="width: 120px;">利用最終日</th>
                    <th style="width: 100px;">利用日数</th>
                    <th style="width: 90px;">精算</th>
                </tr>
            </thead>
            <tbody id="excelTableBody"></tbody>
        </table>
    </div>

    <div id="guestModal">
        <div class="modal-box">
            <div class="modal-title" id="guestModalTitle">駐車情報</div>
            <div class="form-row">
                <div class="form-group room-small">
                    <label>部屋番号</label>
                    <input type="text" id="roomNumber" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>お客様名</label>
                    <input type="text" id="guestName" style="font-size:18px; font-weight:500;">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group check-large">
                    <label>チェックイン</label>
                    <input type="date" id="checkIn" onchange="calculateStayDays()">
                </div>
                <div class="form-group check-large">
                    <label>チェックアウト</label>
                    <input type="date" id="checkOut" onchange="calculateStayDays()">
                </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWV0CdSSDznxXKdlTbJc4-AMrjVr51Hlo",
            authDomain: "test-f20cf.firebaseapp.com",
            databaseURL: "https://test-f20cf-default-rtdb.asia-southeast1.firebasedatabase.app/",

        // iOS: reconnect khi quay lại tab
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') forceReload();
        });

        const spotConfig = [
            { id: 1, type: 'short-rect' }, { id: 2, type: 'short-rect' }, { id: 3, type: 'short-rect' }, { id: 4, type: 'handicapped' },
            { id: 5, type: 'top-row-spot' }, { id: 6, type: 'top-row-spot' }, { id: 7, type: 'top-row-spot' }, { id: 8, type: 'top-row-spot' }, { id: 9, type: 'top-row-spot' },
            { id: 10, type: 'short-rect' }, { id: 11, type: 'short-rect' }, { id: 12, type: 'short-rect' }, { id: 13, type: 'short-rect' }, { id: 14, type: 'short-rect' },
            { id: 15, type: 'short-rect' }, { id: 16, type: 'short-rect' }, { id: 17, type: 'short-rect' }, { id: 18, type: 'short-rect' },
            { id: 21, type: 'normal' }, { id: 20, type: 'normal' }, { id: 19, type: 'normal' }
        ];

        let modalSeisanStatus = "済";
        let currentSpot = null;
        let pendingMoveData = null;

        window.onload = function () {
            const staySelect = document.getElementById('stayDays');
            for (let i = 1; i <= 30; i++) {
                const option = document.createElement('option');
                option.value = i; option.textContent = `${i}泊`; staySelect.appendChild(option);

        function formatDateLocal(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function localApiFetch(url, options = {}) {
            // Chỉ gọi khi chạy trên localhost, bỏ qua khi chạy trên web
            if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return null;
            try {
                return await fetch(url, options);
            } catch (e) {
                return null;
            }
        }

        function renderMap() {
            const grid = document.getElementById('parkingGrid'); grid.innerHTML = "";
            const hatch = document.createElement('div'); hatch.className = 'hatched-zone'; grid.appendChild(hatch);
            const road = document.createElement('div'); road.className = 'main-road'; road.innerText = 'entrance'; grid.appendChild(road);

            spotConfig.forEach(spot => {
                const div = document.createElement('div');
                div.className = `parking-spot ${spot.type}`; div.id = `spot-${spot.id}`; div.setAttribute('data-num', spot.id);
                div.draggable = true;

                const displayNum = spot.id === 4 ? '♿ 4' : spot.id;
                div.innerHTML = `
                    <div class="name-display">
                        <div class="text-content-wrapper" id="html-text-${spot.id}"></div>
                    </div>
                    <div class="spot-content-overlay">
                        <span class="spot-num-header">${displayNum}</span>
                    </div>
                    <div class="note-star">★</div>
                `;

                let clickTimer = null;
                div.onclick = (e) => {
                    if (clickTimer) {
                        clearTimeout(clickTimer); clickTimer = null; openStaffModal(div);
                    } else {
                        clickTimer = setTimeout(() => { openGuestModal(div); clickTimer = null; }, 250);
                    }
                };

                div.addEventListener('dragstart', handleDragStart);
                div.addEventListener('dragover', handleDragOver);
                div.addEventListener('dragleave', handleDragLeave);
                div.addEventListener('drop', handleDrop);
                div.addEventListener('dragend', handleDragEnd);

                div.addEventListener('touchstart', handleTouchStart, { passive: false });
                div.addEventListener('touchmove', handleTouchMove, { passive: false });
                div.addEventListener('touchend', handleTouchEnd, { passive: false });
                grid.appendChild(div);
            });
        }

        function buildExcelTableStructure() {
            const tbody = document.getElementById('excelTableBody'); tbody.innerHTML = "";
            for (let i = 1; i <= 21; i++) {
                const tr = document.createElement('tr'); tr.id = `table-row-${i}`;
                tr.innerHTML = `
                    <td class="check-col"><input type="checkbox" class="custom-checkbox" id="row-check-${i}" onchange="toggleRowColor(this)"></td>
                    <td class="col-stt" style="font-weight:bold !important;">${i === 4 ? '♿ 4' : i}</td>
                    <td class="col-room-number"></td>
                    <td class="col-guest-name"></td>
                    <td class="col-car-number"></td>
                    <td></td><td></td><td></td><td></td>
                `;
                tbody.appendChild(tr);
            }
        }

        function toggleRowColor(checkbox) {
            const row = checkbox.closest('tr');
            if (checkbox.checked) row.classList.add('row-checked');
            else row.closest('tr').classList.remove('row-checked');
        }

        function clearAllRowChecks() {
            document.querySelectorAll('.custom-checkbox').forEach(cb => {
                cb.checked = false; cb.closest('tr').classList.remove('row-checked');
            });
            showToast("チェックをすべて解除しました");
        }

        function toggleSeisanModalStatus() {
            const btn = document.getElementById('seisanToggle');
            if (modalSeisanStatus === "済") {
                modalSeisanStatus = "未"; btn.innerText = "未"; btn.classList.add('unpaid');
            } else {
                modalSeisanStatus = "済"; btn.innerText = "済"; btn.classList.remove('unpaid');
            }
        }

        function calculateDisplayDaysLogic(checkInStr, checkOutStr, targetDateStr) {
            if (!checkInStr || !checkOutStr) return "";
            const start = new Date(checkInStr); const end = new Date(checkOutStr); const current = new Date(targetDateStr);
            const diffTime = end - start;
            const totalN = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (totalN <= 0) return "";
            if (totalN === 1) return "1N";
            const timeFromStart = current - start;
            const currentDayIndex = Math.floor(timeFromStart / (1000 * 60 * 60 * 24));
            return `${totalN}N-${currentDayIndex + 1}`;
        }

        let draggedSpotNum = null;
        function handleDragStart(e) {
            if (!this.classList.contains('booked') && !this.classList.contains('staff')) { e.preventDefault(); return; }
            draggedSpotNum = this.getAttribute('data-num'); this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', draggedSpotNum);
        }
        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; this.classList.add('drag-over'); }
        function handleDragLeave() { this.classList.remove('drag-over'); }
        function handleDragEnd() {
            this.classList.remove('dragging');
            document.querySelectorAll('.parking-spot').forEach(el => el.classList.remove('drag-over', 'dragging'));
        }
        async function handleDrop(e) {
            e.preventDefault(); this.classList.remove('drag-over');
            const fromSpotNum = e.dataTransfer.getData('text/plain'); const toSpotNum = this.getAttribute('data-num');
            if (!fromSpotNum || fromSpotNum === toSpotNum) return;
            openPassModal(fromSpotNum, toSpotNum);
        }

        let touchStartElement = null; let touchDragNum = null;
        function handleTouchStart(e) {
            if (!this.classList.contains('booked') && !this.classList.contains('staff')) return;
            touchStartElement = this; touchDragNum = this.getAttribute('data-num'); this.classList.add('dragging');
        }
        function handleTouchMove(e) {
            if (!touchStartElement) return; if (e.cancelable) e.preventDefault();
            const touch = e.touches[0]; const elementTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropTarget = elementTarget ? elementTarget.closest('.parking-spot') : null;
            document.querySelectorAll('.parking-spot').forEach(el => el.classList.remove('drag-over'));
            if (dropTarget && dropTarget !== touchStartElement) dropTarget.classList.add('drag-over');
        }
        async function handleTouchEnd(e) {
            if (!touchStartElement) return;
            touchStartElement.classList.remove('dragging');
            const touch = e.changedTouches[0]; const elementTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropTarget = elementTarget ? elementTarget.closest('.parking-spot') : null;
            document.querySelectorAll('.parking-spot').forEach(el => el.classList.remove('drag-over'));

            if (dropTarget && touchDragNum) {
                const toSpotNum = dropTarget.getAttribute('data-num');
                if (touchDragNum !== toSpotNum) openPassModal(touchDragNum, toSpotNum);
            }
            touchStartElement = null; touchDragNum = null;
        }

        function openPassModal(fromNum, toNum) {
            pendingMoveData = { fromNum: fromNum, toNum: toNum };
            const desc = document.getElementById('passMoveDesc');
            if (desc) desc.textContent = `駐車番号 ${fromNum} を 駐車番号 ${toNum} に移動しますか？`;
            document.getElementById('passModal').style.display = 'flex';
        }

        function closePassModal() {
            document.getElementById('passModal').style.display = 'none';
            pendingMoveData = null;
        }

        async function verifyAndMove() {
            if (!pendingMoveData) return;
            const runFrom = pendingMoveData.fromNum;
            const runTo = pendingMoveData.toNum;
            document.getElementById('passModal').style.display = 'none';
            pendingMoveData = null;
            await executeMoveDualSync(runFrom, runTo);
        }

        async function executeMoveDualSync(fromNum, toNum) {
            const date = document.getElementById('parkingDate').value;
            const fromEl = document.getElementById(`spot-${fromNum}`);
            const toEl = document.getElementById(`spot-${toNum}`);
            if (!fromEl || !toEl) return;

            const fromStatus = fromEl.classList.contains('staff') ? 'staff' : (fromEl.classList.contains('booked') ? 'booked' : '');
            const toStatus   = toEl.classList.contains('staff')   ? 'staff' : (toEl.classList.contains('booked')   ? 'booked' : '');

            let fromInfo = null, toInfo = null;
            try { if (fromEl.dataset.info) fromInfo = JSON.parse(fromEl.dataset.info); } catch(e) {}
            try { if (toEl.dataset.info)   toInfo   = JSON.parse(toEl.dataset.info);   } catch(e) {}

            if (!fromStatus && !fromInfo) return;

            // Tạm tắt listener để tránh re-render khi đang thao tác
            if (_currentListenerRef) { _currentListenerRef.off('value'); _currentListenerRef = null; _currentListenerDate = null; }

            // Danh sách ngày từ hôm nay → checkOut
            function getRemainingDates(info) {
                if (!info?.checkOut) return [date];
                const list = [], cur = new Date(date), end = new Date(info.checkOut);
                while (cur < end) { list.push(formatDateLocal(new Date(cur))); cur.setDate(cur.getDate()+1); }
                return list.length ? list : [date];
            }

            const fromDates = getRemainingDates(fromInfo);

            // Bước 1: Xóa ô nguồn từ hôm nay → checkOut
            for (const d of fromDates) {
                await localApiFetch('/api/parking/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ date_key: d, spot_id: parseInt(fromNum) }) });
                if (navigator.onLine) try { await db.ref(`parking/${d}/${fromNum}`).remove(); } catch(e) {}
            }

            // Bước 2: Nếu ô đích có booking → xóa ô đích từ hôm nay → checkOut, lưu về ô nguồn chỉ ngày hôm nay
            if (toStatus) {
                const toDates = getRemainingDates(toInfo);
                for (const d of toDates) {
                    await localApiFetch('/api/parking/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ date_key: d, spot_id: parseInt(toNum) }) });
                    if (navigator.onLine) try { await db.ref(`parking/${d}/${toNum}`).remove(); } catch(e) {}
                }
                await localApiFetch('/api/parking/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ date_key: date, spot_id: parseInt(fromNum), status: toStatus, info: toInfo }) });
                if (navigator.onLine) try { await db.ref(`parking/${date}/${fromNum}`).set({ status: toStatus, info: toInfo }); } catch(e) {}
            }

            // Bước 3: Lưu ô nguồn → ô đích cho TẤT CẢ ngày còn lại
            for (const d of fromDates) {
                await localApiFetch('/api/parking/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ date_key: d, spot_id: parseInt(toNum), status: fromStatus, info: fromInfo }) });
                if (navigator.onLine) try { await db.ref(`parking/${d}/${toNum}`).set({ status: fromStatus, info: fromInfo }); } catch(e) {}
            }

            showToast("位置を移動しました");
        }

        function formatVerticalHtmlString(str) {
            if (!str) return "";
            return str.split('').map(ch => {
                if (ch === '-' || ch === 'ー' || ch === '―' || ch === '‐') {
                    return `<span class="text-inner char-dash">─</span>`;
                }
                return `<span class="text-inner">${ch}</span>`;
            }).join('');
        }

        /* Font cố định, chỉ thu nhỏ khi tràn — không tự dãn to */
        function adjustSingleSpotTextFontSize(spotNum, textString) {
            const container = document.getElementById(`html-text-${spotNum}`);
            if (!container) return;

            container.innerHTML = formatVerticalHtmlString(textString);
            if (!textString) return;

            container.style.fontWeight = "400";
            const parent = container.parentElement;

            const safeW = parent.clientWidth - 4;
            const safeH = parent.clientHeight - 4;

            // Kích thước cố định ban đầu — không tự to hơn mức này
            const BASE_SIZE = 28;
            let currentSize = BASE_SIZE;
            container.style.fontSize = currentSize + "px";

            // Chỉ thu nhỏ nếu tràn, không bao giờ tăng lên
            while (currentSize > 7) {
                if (container.scrollWidth <= safeW && container.scrollHeight <= safeH) break;
                currentSize -= 1;
                container.style.fontSize = currentSize + "px";
            }
        }

        let _currentListenerDate = null;
        let _currentListenerRef = null;
        const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

        // renderViewWithData ở ngoài — dùng chung cho mọi nơi
        function renderViewWithData(data) {
            const date = document.getElementById('parkingDate').value;
            const checkStates = {};
            for (let i = 1; i <= 21; i++) {
                const cb = document.getElementById(`row-check-${i}`); if (cb) checkStates[i] = cb.checked;
            }
            document.querySelectorAll('.parking-spot').forEach(el => {
                const sNum = el.dataset.num;
                el.classList.remove('booked', 'staff');
                const textContainer = document.getElementById(`html-text-${sNum}`);
                if (textContainer) textContainer.innerHTML = "";
                el.querySelector('.note-star').style.display = 'none'; el.dataset.info = "";
                if (data && data[sNum]) {
                    const spotData = data[sNum];
                    if (spotData.status === 'booked') el.classList.add('booked');
                    else if (spotData.status === 'staff') el.classList.add('staff');
                    if (spotData.info) {
                        el.dataset.info = JSON.stringify(spotData.info);
                        if (spotData.info.carNumber) adjustSingleSpotTextFontSize(sNum, spotData.info.carNumber);
                        if (spotData.info.guestNote && spotData.info.guestNote.trim() !== "") el.querySelector('.note-star').style.display = 'block';
                    }
                }
            });
            for (let i = 1; i <= 21; i++) {
                const tr = document.getElementById(`table-row-${i}`);
                if (tr) {
                    const isRowChecked = checkStates[i] ? "row-checked" : ""; tr.className = isRowChecked;
                    tr.innerHTML = `<td class="check-col"><input type="checkbox" class="custom-checkbox" id="row-check-${i}" onchange="toggleRowColor(this)" ${checkStates[i] ? 'checked' : ''}></td>
                        <td class="col-stt" style="font-weight:bold !important;">${i === 4 ? '♿ 4' : i}</td>
                        <td class="col-room-number"></td><td class="col-guest-name"></td><td class="col-car-number"></td>
                        <td></td><td></td><td></td><td></td>`;
                }
            }
            if (data) {
                Object.keys(data).forEach(spotNumStr => {
                    const spotNum = parseInt(spotNumStr);
                    if (spotNum >= 1 && spotNum <= 21) {
                        const tr = document.getElementById(`table-row-${spotNum}`); const spotData = data[spotNumStr];
                        if (tr && spotData && (spotData.status === 'booked' || spotData.status === 'staff') && spotData.info) {
                            let room = spotData.info.roomNumber || ""; const note = spotData.info.guestNote || "";
                            let carNum = spotData.info.carNumber || ""; const checkIn = spotData.info.checkIn || "";
                            const checkOut = spotData.info.checkOut || ""; const seisan = spotData.info.seisanStatus || "済";
                            let name = spotData.info.guestName || "";
                            let roomDisplay = "", checkInDisplay = "", checkOutDisplay = "", dayLogicDisplay = "", seisanDisplay = "";
                            if (spotData.status === 'staff') {
                                if (room === "STAFF") room = "スタッフ";
                                roomDisplay = room;
                            } else {
                                roomDisplay = room ? `R${room}` : "";
                                checkInDisplay = checkIn ? checkIn.substring(5).replace('-', '/') : "";
                                checkOutDisplay = checkOut ? checkOut.substring(5).replace('-', '/') : "";
                                dayLogicDisplay = calculateDisplayDaysLogic(checkIn, checkOut, date);
                                const seisanClass = (seisan === "未") ? "seisan-mi" : "seisan-zai";
                                seisanDisplay = `<span class="status-circle ${seisanClass}">${seisan}</span>`;
                            }
                            const isRowChecked = checkStates[spotNum] ? "row-checked" : ""; tr.className = isRowChecked;
                            tr.innerHTML = `<td class="check-col"><input type="checkbox" class="custom-checkbox" id="row-check-${spotNum}" onchange="toggleRowColor(this)" ${checkStates[spotNum] ? 'checked' : ''}></td>
                                <td class="col-stt" style="font-weight:bold !important;">${spotNum === 4 ? '♿ 4' : spotNum}</td>
                                <td class="col-room-number">${roomDisplay}</td>
                                <td class="col-guest-name">${name} ${note ? '<span style="color:#e74c3c; font-size:26px;">★</span>' : ''}</td>
                                <td class="col-car-number" style="font-weight:bold !important; color:#1a6ddb !important;">${carNum}</td>
                                <td>${checkInDisplay}</td><td>${checkOutDisplay}</td>
                                <td style="font-weight:bold; color:#2c3e50;">${dayLogicDisplay}</td><td>${seisanDisplay}</td>`;
                            tr.style.cursor = 'pointer';
                            tr.ondblclick = () => { const spotEl = document.getElementById(`spot-${spotNum}`); if (spotEl) openGuestModal(spotEl); };
                        }
                    }
                });
            }
        }

        let _activeDate = null;

        // Attach listener — chỉ off+on khi đổi ngày, không off khi cùng ngày
        function loadParkingData() {
            const date = document.getElementById('parkingDate').value;

            // Nếu đã có listener cho ngày này rồi → không làm gì, listener đang chạy
            if (_activeDate === date) return;

            // Đổi ngày → tắt listener cũ, bật listener mới
            if (_activeDate) db.ref('parking/' + _activeDate).off();
            _activeDate = date;

            if (isLocalhost && !navigator.onLine) {
                localApiFetch(`/api/parking/${date}`).then(res => res ? res.json() : null).then(d => { if (d) renderViewWithData(d); });
                return;
            }

            db.ref('parking/' + date).on('value', (snapshot) => {
                renderViewWithData(snapshot.val());
                if (snapshot.val() && isLocalhost) {
                    Object.keys(snapshot.val()).forEach(async (id) => {
                        const item = snapshot.val()[id];
                        await localApiFetch('/api/parking/save', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ date_key: date, spot_id: parseInt(id), status: item.status, info: item.info || {} })
                        });
                    });
                }
            }, (error) => {
                console.error('Firebase error:', error.code);
                if (isLocalhost) localApiFetch(`/api/parking/${date}`).then(res => res ? res.json() : null).then(d => { if (d) renderViewWithData(d); });
            });
        }

        // Buộc reload data (dùng cho 更新 button và visibilitychange)
        function forceReload() {
            const date = document.getElementById('parkingDate').value;
            db.ref('parking/' + date).off();
            _activeDate = null;
            loadParkingData();
        }

        function refreshData() {
            const dInput = document.getElementById('parkingDate');
            dInput.value = formatDateLocal(new Date());
            _activeDate = null;
            forceReload();
            showToast("更新しました");
        }

        function jumpToToday() {
            const dInput = document.getElementById('parkingDate');
            const todayStr = formatDateLocal(new Date());
            if (dInput.value !== todayStr) {
                dInput.value = todayStr;
                showToast("更新しました");
                loadParkingData();
            } else {
                showToast("すでに本日の画面です");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block'; t.style.top = '20px';
            setTimeout(() => { t.style.top = '-100px'; t.style.display = 'none'; }, 2000);
        }

        function changeDate(offset) {
            const dateInput = document.getElementById('parkingDate');
            const current = new Date(dateInput.value); current.setDate(current.getDate() + offset);
            dateInput.value = formatDateLocal(current); handleDateChange();
        }
        function handleDateChange() {
            _activeDate = null;
            loadParkingData();
        }

        function updateCheckOutFromStay() {
            const checkInVal = document.getElementById('checkIn').value;
            const stayDays = parseInt(document.getElementById('stayDays').value);
            if (checkInVal && stayDays) {
                const startDate = new Date(checkInVal); startDate.setDate(startDate.getDate() + stayDays);
                document.getElementById('checkOut').value = formatDateLocal(startDate);
            }
        }
        function calculateStayDays() {
            const checkInVal = document.getElementById('checkIn').value;
            const checkOutVal = document.getElementById('checkOut').value;
            if (checkInVal && checkOutVal) {
                const start = new Date(checkInVal); const end = new Date(checkOutVal);
                const diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                document.getElementById('stayDays').value = diffDays > 0 ? diffDays : 1;
            }
        }

        function openStaffModal(el) {
            currentSpot = el;
            const data = el.dataset.info ? JSON.parse(el.dataset.info) : {};
            document.getElementById('staffName').value = data.carNumber || "";
            document.getElementById('staffModal').style.display = 'flex';
        }
        function closeStaffModal() { document.getElementById('staffModal').style.display = 'none'; }

        async function saveStaffInfo() {
            if (!currentSpot) return;
            const name = document.getElementById('staffName').value || "スタッフ";
            const spotNum = currentSpot.dataset.num; const date = document.getElementById('parkingDate').value;

            const staffPayload = {
                date_key: date, spot_id: parseInt(spotNum), status: 'staff',
                info: { roomNumber: "スタッフ", guestName: "", carNumber: name, guestNote: "", checkIn: date, checkOut: date, stayDays: 1, seisanStatus: "済" }
            };

            await localApiFetch('/api/parking/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(staffPayload) });
            if (navigator.onLine) { await db.ref(`parking/${date}/${spotNum}`).set({ status: 'staff', info: staffPayload.info }); }
            showToast("データを保存しました"); closeStaffModal();
        }

        function openGuestModal(el) {
            currentSpot = el;
            const data = el.dataset.info ? JSON.parse(el.dataset.info) : {};
            const todayStr = formatDateLocal(new Date());

            document.getElementById('roomNumber').value = data.roomNumber || "";
            document.getElementById('guestName').value = data.guestName || "";
            document.getElementById('carNumber').value = data.carNumber || "";
            document.getElementById('guestNote').value = data.guestNote || "";
            document.getElementById('checkIn').value = data.checkIn || todayStr;
            document.getElementById('stayDays').value = data.stayDays || "1";
            if (data.checkOut) document.getElementById('checkOut').value = data.checkOut;
            else updateCheckOutFromStay();

            modalSeisanStatus = data.seisanStatus || "済";
            const btn = document.getElementById('seisanToggle'); btn.innerText = modalSeisanStatus;
            if (modalSeisanStatus === "未") btn.classList.add('unpaid');
            else btn.classList.remove('unpaid');

            document.getElementById('guestModalTitle').innerText = `駐車番号 ${el.dataset.num}`;
            document.getElementById('guestModal').style.display = 'flex';
        }
        function closeGuestModal() { document.getElementById('guestModal').style.display = 'none'; }

        function deleteGuestInfo() { document.getElementById('confirmModal').style.display = 'flex'; }
        function deleteStaffInfo() { document.getElementById('confirmModal').style.display = 'flex'; }
        function closeConfirmModal() { document.getElementById('confirmModal').style.display = 'none'; }

        async function executeDelete() {
            if (!currentSpot) return;
            const spotNum = currentSpot.getAttribute('data-num');
            const date = document.getElementById('parkingDate').value;
            const dataInfo = currentSpot.dataset.info ? JSON.parse(currentSpot.dataset.info) : null;
            const isStaffCell = currentSpot.classList.contains('staff');

            if (!isStaffCell && dataInfo && dataInfo.checkOut) {
                // Xóa từ ngày đang xem → checkOut, không đụng ngày trước
                const cur = new Date(date);
                const end = new Date(dataInfo.checkOut);
                while (cur < end) {
                    const dateKey = formatDateLocal(new Date(cur));
                    await localApiFetch('/api/parking/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date_key: dateKey, spot_id: parseInt(spotNum) }) });
                    if (navigator.onLine) try { await db.ref(`parking/${dateKey}/${spotNum}`).remove(); } catch(e) {}
                    cur.setDate(cur.getDate() + 1);
                }
            } else {
                await localApiFetch('/api/parking/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date_key: date, spot_id: parseInt(spotNum) }) });
                if (navigator.onLine) try { await db.ref(`parking/${date}/${spotNum}`).remove(); } catch(e) {}
            }

            closeConfirmModal(); closeGuestModal(); closeStaffModal(); showToast("削除完了");
        }

        async function saveGuestInfo() {
            if (!currentSpot) return;
            const roomNumber = document.getElementById('roomNumber').value; const guestName = document.getElementById('guestName').value;
            const stayDays = parseInt(document.getElementById('stayDays').value) || 1; const carNumber = document.getElementById('carNumber').value;
            const guestNote = document.getElementById('guestNote').value; const originalCheckIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value; const spotNum = currentSpot.getAttribute('data-num');

            // Cảnh báo nếu trùng số xe với ô khác trong cùng ngày
            if (carNumber) {
                const date = document.getElementById('parkingDate').value;
                try {
                    const res = await localApiFetch(`/api/parking/${date}`);
                    const dayData = res ? await res.json() : null;
                    if (dayData) {
                        for (const sid of Object.keys(dayData)) {
                            if (parseInt(sid) !== parseInt(spotNum) && dayData[sid]?.info?.carNumber === carNumber) {
                                const confirm = window.confirm(`⚠️ 車番号「${carNumber}」はすでに駐車番号 ${sid} に登録されています。\nこのまま保存しますか？`);
                                if (!confirm) return;
                                break;
                            }
                        }
                    }
                } catch(e) {}
            }

            for (let i = 0; i < stayDays; i++) {
                const targetDate = new Date(originalCheckIn); targetDate.setDate(targetDate.getDate() + i);
                const dateKey = formatDateLocal(targetDate);
                const payload = {
                    date_key: dateKey, spot_id: parseInt(spotNum), status: 'booked',
                    info: { roomNumber, guestName, carNumber, guestNote, checkIn: originalCheckIn, checkOut, stayDays, seisanStatus: modalSeisanStatus }
                };
                await localApiFetch('/api/parking/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (navigator.onLine) { await db.ref(`parking/${dateKey}/${spotNum}`).set({ status: 'booked', info: payload.info }); }
            }
            closeGuestModal(); showToast("データを保存しました");
        }

        async function exportToExcel() {
            try {
                const date = document.getElementById('parkingDate').value;
                let data = null;
                const res = await localApiFetch(`/api/parking/${date}`);
                data = res ? await res.json() : null;

                // Firebase fallback
                if (!data || Object.keys(data).length === 0) {
                    if (navigator.onLine) {
                        const snap = await db.ref(`parking/${date}`).once('value');
                        data = snap.val();
                    }
                }

                const workbook = new ExcelJS.Workbook();
                const ws = workbook.addWorksheet('駐車場（A5）');

                // A5 page setup
                ws.pageSetup = {
                    paperSize: 13,
                    orientation: 'portrait',
                    fitToPage: true,
                    fitToWidth: 1,
                    fitToHeight: 1,
                    margins: { left: 0.3, right: 0.3, top: 0.5, bottom: 0.5, header: 0.2, footer: 0.2 }
                };

                // Col A: blank (hole punch margin)
                ws.getColumn(1).width = 3.0;
                // Data columns B-I
                ws.getColumn(2).width = 4.5;   // 台数
                ws.getColumn(3).width = 7.5;   // 部屋
                ws.getColumn(4).width = 18.0;  // お客様名 — rộng hơn
                ws.getColumn(5).width = 10.0;  // 車番
                ws.getColumn(6).width = 7.5;   // IN
                ws.getColumn(7).width = 7.5;   // OUT
                ws.getColumn(8).width = 5.5;   // 泊数
                ws.getColumn(9).width = 5.5;   // 精算

                // Row 1 — title + date (B:I, A blank)
                ws.getRow(1).height = 36;
                ws.mergeCells('B1:E1');
                ws.mergeCells('F1:I1');
                const titleCell = ws.getCell('B1');
                titleCell.value = '駐車場管理表';
                titleCell.font = { name: '游ゴシック', size: 18, bold: true };
                titleCell.alignment = { horizontal: 'center', vertical: 'middle' };

                const [y, m, d] = date.split('-');
                const dateCell = ws.getCell('F1');
                dateCell.value = `${y}年 ${parseInt(m)}月 ${parseInt(d)}日`;
                dateCell.font = { name: '游ゴシック', size: 16, bold: true };
                dateCell.alignment = { horizontal: 'center', vertical: 'middle' };

                // Row 2 — headers (B:I)
                ws.getRow(2).height = 20;
                const headers = ['台数','部屋','お客様名','車番','IN','OUT','泊数','精算'];
                headers.forEach((h, i) => {
                    const cell = ws.getCell(2, i + 2);
                    cell.value = h;
                    cell.font = { name: '游ゴシック', size: 9, bold: true };
                    cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: false };
                    cell.border = {
                        top: { style: 'medium' }, bottom: { style: 'medium' },
                        left: { style: i === 0 ? 'medium' : 'thin' },
                        right: { style: i === 7 ? 'medium' : 'thin' }
                    };
                });

                // Rows 3-23 (spot 1-21), data in B-I
                for (let i = 1; i <= 21; i++) {
                    const rowNum = i + 2;
                    ws.getRow(rowNum).height = 18;
                    const item = data && data[i] ? data[i] : null;
                    const info = item?.info || {};

                    let roomNum = '', guestName = '', carNum = '', checkIn = '', checkOut = '', days = '', seisan = '未・済';

                    if (item && item.status === 'booked' && info) {
                        roomNum = info.roomNumber ? `R${info.roomNumber}` : '';
                        guestName = info.guestName || '';
                        carNum = info.carNumber || '';
                        if (info.checkIn) checkIn = info.checkIn.substring(5).replace('-', '/');
                        if (info.checkOut) checkOut = info.checkOut.substring(5).replace('-', '/');
                        days = calculateDisplayDaysLogic(info.checkIn, info.checkOut, date) || '';
                        seisan = info.seisanStatus || '済';
                    }

                    const vals = [i, roomNum, guestName, carNum, checkIn || '/', checkOut || '/', days, seisan];
                    vals.forEach((v, ci) => {
                        const cell = ws.getCell(rowNum, ci + 2); // B=2
                        cell.value = v;
                        cell.font = { name: '游ゴシック', size: 10 };
                        // cột tên khách (ci=2) căn trái
                        cell.alignment = { horizontal: ci === 2 ? 'left' : 'center', vertical: 'middle', wrapText: false };
                        const isLast = i === 21;
                        cell.border = {
                            top: { style: 'thin' },
                            bottom: { style: isLast ? 'medium' : 'thin' },
                            left: { style: ci === 0 ? 'medium' : 'thin' },
                            right: { style: ci === 7 ? 'medium' : 'thin' }
                        };
                    });
                }

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = `駐車場_${date}.xlsx`;
                link.click();
                showToast('Excel出力完了');
            } catch (error) {
                showToast('Excel出力エラー: ' + error.message);
                console.error(error);
            }
        }

        window.addEventListener('keydown', function (e) { if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) { e.preventDefault(); jumpToToday(); } });

        let touchStartY = 0;
        window.addEventListener('touchstart', function (e) { touchStartY = e.touches[0].clientY; });
        window.addEventListener('touchend', function (e) { if (e.changedTouches[0].clientY - touchStartY > 120) jumpToToday(); });
    </script>
</body>

</html>

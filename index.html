<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parking management system</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>


    <style>
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background-color: #f4f6f8; margin: 0; padding: 5px 10px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .controls {
            display: flex; gap: 20px; align-items: center; margin-bottom: 5px;
            background: #fff; padding: 10px 25px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 98vw; max-width: 1500px; box-sizing: border-box;
        }
        input[type="date"] { padding: 5px; border: 1px solid #ddd; border-radius: 4px; outline: none; cursor: pointer; }
        .btn-reset { 
            background-color: #e74c3c; color: white; border: none; 
            padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }

        .main-title { font-size: 28px; font-weight: 300; color: #2c3e50; margin: 10px 0 15px 0; letter-spacing: 8px; text-align: center; }

        /* CẬP NHẬT KHUNG TO RA */
        .parking-lot-map {
            position: relative; background-color: #fff; border: 2px solid #34495e; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 98vw; 
            max-width: 1500px; /* Tăng chiều rộng tối đa */
            padding: 30px; /* Tăng đệm bên trong */
            box-sizing: border-box;
        }
        .grid-container {
            display: grid; gap: 10px; grid-template-rows: 110px 10px 40px 70px 110px;
            grid-template-columns: repeat(19, 1fr); width: 100%;
        }
        .parking-spot {
            background-color: #2ecc71; border: 1.5px solid #27ae60; border-radius: 4px; color: #fff;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            font-size: 20px; /* Tăng kích thước số thứ tự ô */
            font-weight: bold; cursor: pointer; transition: all 0.2s;
            padding: 6px 2px; position: relative; overflow: hidden;
            user-select: none;
        }
        .parking-spot.booked { background-color: #e74c3c !important; border-color: #c0392b !important; }
        .parking-spot.staff { background-color: #f39c12 !important; border-color: #e67e22 !important; }
        .parking-spot.handicapped { background-color: #3498db; border-color: #2980b9; }

        .name-display {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 15px; 
            margin-top: 10px;
            height: 75%;
            width: 85%;
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 4px;
            padding: 5px 2px;
            text-align: center;
            font-weight: 700; 
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4); 
            box-sizing: border-box;
        }

        .hatched-zone { grid-column: 4; grid-row: 1 / span 3; background-image: repeating-linear-gradient(45deg, #f9f9f9, #f9f9f9 5px, #eee 5px, #eee 10px); border: 1px solid #eee; }
        .short-rect { grid-row: 1 / span 3; }
        #spot-1 { grid-column: 1; } #spot-2 { grid-column: 2; } #spot-3 { grid-column: 3; }
        #spot-4 { grid-column: 5 / span 1.5; grid-row: 1 / span 3; }
        .top-row-spot { grid-row: 1; }
        #spot-5 { grid-column: 6; } #spot-6 { grid-column: 7; } #spot-7 { grid-column: 8; } #spot-8 { grid-column: 9; } #spot-9 { grid-column: 10; }
        .main-road { grid-row: 4; grid-column: 1 / span 19; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 11px; letter-spacing: 5px; border-top: 1px dashed #f5f5f5; }
        #spot-21 { grid-row: 5; grid-column: 17; } #spot-20 { grid-row: 5; grid-column: 18; } #spot-19 { grid-row: 5; grid-column: 19; }

        .legend { margin-top: 25px; display: flex; gap: 40px; padding: 15px 40px; background: #fff; border-radius: 10px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .legend-item { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 300; color: #444; }
        .color-box { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); }

        /* POPUP & TOAST */
        #customModalOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center;
            align-items: flex-start; padding-top: 12vh; z-index: 1000;
        }
        .modal-box { background: #fff; padding: 25px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-title { font-size: 17px; margin-bottom: 20px; color: #2c3e50; font-weight: bold; line-height: 1.5; }
        .modal-input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; }
        .modal-buttons { display: flex; justify-content: center; gap: 10px; }
        .btn-confirm { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        .btn-cancel { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #34495e; color: white; padding: 12px 30px; border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: top 0.5s ease; z-index: 2000;
        }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

    <div id="toast">通知</div>

    <div id="customModalOverlay">
        <div class="modal-box">
            <div id="modalTitle" class="modal-title"></div>
            <input type="text" id="modalInput" class="modal-input" style="display: none;">
            <div class="modal-buttons">
                <button id="modalConfirmBtn" class="btn-confirm">はい</button>
                <button id="modalCancelBtn" class="btn-cancel">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <div><label>日付:</label> <input type="date" id="parkingDate" onchange="handleDateChange()"></div>
        <button class="btn-reset" onclick="handleReset()">全リセット</button>
    </div>

    <div class="main-title">駐車場</div>

    <div class="parking-lot-map">
        <div class="grid-container" id="parkingGrid"></div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background: #2ecc71;"></div>空き</div>
        <div class="legend-item"><div class="color-box" style="background: #e74c3c;"></div>予約済</div>
        <div class="legend-item"><div class="color-box" style="background: #f39c12;"></div>スタッフ用＆予備</div>
        <div class="legend-item"><div class="color-box" style="background: #3498db;"></div>身障者用</div>
    </div>

   <script>
        // --- 1. CẤU HÌNH FIREBASE (HÃY THAY THẾ BẰNG THÔNG TIN CỦA BẠN) ---
         const firebaseConfig = {
    apiKey: "AIzaSyCiOKQOqtvxiEDtm0pEoVTmJs4egQ7w6qA",
    authDomain: "parking-system-893ac.firebaseapp.com",
    databaseURL: "https://parking-system-893ac-default-rtdb.firebaseio.com",
    projectId: "parking-system-893ac",
    storageBucket: "parking-system-893ac.firebasestorage.app",
    messagingSenderId: "511465408381",
    appId: "1:511465408381:web:f35ad369ec6bbc1278ee14",
    measurementId: "G-RCMPPE9VD4"
  };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const spotConfig = [
            { id: 1, type: 'short-rect' }, { id: 2, type: 'short-rect' }, { id: 3, type: 'short-rect' },
            { id: 4, type: 'handicapped' }, { id: 5, type: 'top-row-spot' }, { id: 6, type: 'top-row-spot' },
            { id: 7, type: 'top-row-spot' }, { id: 8, type: 'top-row-spot' }, { id: 9, type: 'top-row-spot' },
            { id: 10, type: 'short-rect' }, { id: 11, type: 'short-rect' }, { id: 12, type: 'short-rect' },
            { id: 13, type: 'short-rect' }, { id: 14, type: 'short-rect' }, { id: 15, type: 'short-rect' },
            { id: 16, type: 'short-rect' }, { id: 17, type: 'short-rect' }, { id: 18, type: 'short-rect' },
            { id: 21, type: 'normal' }, { id: 20, type: 'normal' }, { id: 19, type: 'normal' }
        ];

        let clickTimer = null;

        window.onload = function() {
            const dInput = document.getElementById('parkingDate');
            const lastVisited = localStorage.getItem('parking_last_visited_date');
            dInput.value = lastVisited || new Date().toISOString().split('T')[0];
            renderMap();
            loadParkingData();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function handleDateChange() {
            const newDate = document.getElementById('parkingDate').value;
            localStorage.setItem('parking_last_visited_date', newDate);
            resetDisplayOnly();
            loadParkingData();
            showToast(`${newDate} data loaded.`);
        }

        function resetDisplayOnly() {
            document.querySelectorAll('.parking-spot').forEach(el => {
                el.classList.remove('staff', 'booked');
                const display = el.querySelector('.name-display');
                if(display) display.innerText = "";
            });
        }

        function renderMap() {
            const grid = document.getElementById('parkingGrid');
            grid.innerHTML = "";
            const hatch = document.createElement('div'); hatch.className = 'hatched-zone'; grid.appendChild(hatch);
            const road = document.createElement('div'); road.className = 'main-road'; road.innerText = 'entrance'; grid.appendChild(road);

            spotConfig.forEach(spot => {
                const div = document.createElement('div');
                div.className = `parking-spot ${spot.type}`;
                div.id = `spot-${spot.id}`;
                div.setAttribute('data-num', spot.id);
                div.innerHTML = `<div>${spot.id === 4 ? '♿ 4' : spot.id}</div><div class="name-display"></div>`;
                
                const nameDisplay = div.querySelector('.name-display');
                nameDisplay.onclick = (e) => { e.stopPropagation(); showNameModal(div, nameDisplay); };
                div.onclick = () => handleSingleClick(div);
                div.ondblclick = () => handleDoubleClick(div);
                grid.appendChild(div);
            });
        }

        // Modal Logic
        const overlay = document.getElementById('customModalOverlay');
        const mTitle = document.getElementById('modalTitle');
        const mInput = document.getElementById('modalInput');
        const mConfirm = document.getElementById('modalConfirmBtn');
        const mCancel = document.getElementById('modalCancelBtn');

        function showModal(title, isInput, onConfirm) {
            mTitle.innerText = title;
            mInput.style.display = isInput ? 'block' : 'none';
            overlay.style.display = 'flex';
            mConfirm.onclick = () => { onConfirm(isInput ? mInput.value : true); overlay.style.display = 'none'; };
            mCancel.onclick = () => overlay.style.display = 'none';
        }

        function handleSingleClick(el) {
            if (clickTimer) return;
            clickTimer = setTimeout(() => {
                const num = el.getAttribute('data-num');
                const isBusy = el.classList.contains('staff') || el.classList.contains('booked');
                let nextAction = isBusy ? "empty" : "booked";
                showModal(`spot ${num}: set to ${nextAction}?`, false, (confirmed) => {
                    if (confirmed) {
                        el.classList.remove('staff', 'booked');
                        if (nextAction === "booked") el.classList.add('booked');
                        saveParkingData();
                    }
                });
                clickTimer = null;
            }, 250);
        }

        function handleDoubleClick(el) {
            clearTimeout(clickTimer); clickTimer = null;
            const num = el.getAttribute('data-num');
            showModal(`spot ${num}: set to staff?`, false, (confirmed) => {
                if (confirmed) {
                    el.classList.remove('booked');
                    el.classList.add('staff');
                    saveParkingData();
                }
            });
        }

        function showNameModal(parentEl, displayEl) {
            const oldVal = displayEl.innerText;
            mInput.value = oldVal;
            showModal("enter name/plate:", true, (val) => {
                displayEl.innerText = val.trim();
                saveParkingData();
                showToast("updated.");
            });
        }

        function handleReset() {
            showModal("reset all data for today?", false, (confirmed) => {
                if (confirmed) {
                    resetDisplayOnly();
                    saveParkingData();
                    showToast("reset done.");
                }
            });
        }

        // --- FIREBASE SAVE & LOAD ---
        function saveParkingData() {
            const date = document.getElementById('parkingDate').value;
            const data = {};
            document.querySelectorAll('.parking-spot').forEach(spot => {
                const num = spot.getAttribute('data-num');
                data[num] = {
                    status: spot.classList.contains('booked') ? 'booked' : (spot.classList.contains('staff') ? 'staff' : 'empty'),
                    note: spot.querySelector('.name-display').innerText
                };
            });
            // Lưu lên Firebase
            db.ref('parking/' + date).set(data);
        }

        function loadParkingData() {
            const date = document.getElementById('parkingDate').value;
            db.ref('parking/' + date).once('value', (snapshot) => {
                const data = snapshot.val();
                resetDisplayOnly();
                if (data) {
                    Object.keys(data).forEach(num => {
                        const el = document.querySelector(`[data-num="${num}"]`);
                        if (el) {
                            if (data[num].status === 'booked') el.classList.add('booked');
                            if (data[num].status === 'staff') el.classList.add('staff');
                            el.querySelector('.name-display').innerText = data[num].note || "";
                        }
                    });
                }
            });
        }
    </script>

</body>
</html>

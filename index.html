<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>駐車場管理システム</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<link rel="icon" type="image/png" href="favicon.png">

<style>

body{
    font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;    background:#f4f6f8;
    margin:0;
    padding:5px 10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
}

.controls{
    display:flex;
    gap:20px;
    align-items:center;
    margin-bottom:5px;
    background:#fff;
    padding:10px 25px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
    width:98vw;
    max-width:1500px;
    box-sizing:border-box;
}

input[type="date"]{
    padding:5px;
    border:1px solid #ddd;
    border-radius:4px;
}

.btn-reset{
    background:#e74c3c;
    color:#fff;
    border:none;
    padding:8px 15px;
    border-radius:4px;
    cursor:pointer;
}

.main-title{
    font-size:30px;
    font-weight:300;
    color:#2c3e50;
    letter-spacing:8px;

}
.top-bar{
    width:98vw;
    max-width:1500px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
}

.date-controls{
    width:98vw;
    max-width:1500px;

    display:flex;
    justify-content:flex-end;

    padding-right:10px;
    box-sizing:border-box;

    align-items:center;
    gap:6px;
    font-size:12px;
    margin-bottom :5px

    
}
.date-controls input[type="date"]{
    padding:3px 6px;
    font-size:12px;
    height:20px;
}

.date-controls button{
    height:28px;
    padding:0 8px;
    border:none;
    border-radius:4px;
    color:black;
    cursor:pointer;
    font-size:12px;
   
}

.parking-lot-map{
    position:relative;
    background:#fff;
    border:2px solid #34495e;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    width:98vw;
    max-width:1500px;
    padding:30px;
    box-sizing:border-box;
}

.grid-container{
    display:grid;
    gap:10px;
    grid-template-rows:140px 0px 40px 70px 140px;
    grid-template-columns:repeat(19,1fr);
    width:100%;
}
/* Các ô 5, 6, 7, 8, 9 */
.top-row-spot {
    grid-row: 1;
    height: 100%; /* Đảm bảo ô kéo dài hết hàng */
}

/* Các ô 19, 20, 21 */
#spot-19, #spot-20, #spot-21 {
    grid-row: 5;
    height: 100%;
}

/* Các ô ngắn (1, 2, 3 và 10-18) vẫn giữ nguyên hoặc bạn có thể chỉnh lại */
.short-rect {
    grid-row: 1 / span 3; 
    /* Lưu ý: Nếu hàng 1 dài ra, các ô này cũng sẽ dài theo. 
       Nếu muốn chúng ngắn lại, bạn có thể đặt height cố định cho .short-rect */
}
.parking-spot{
    background:#2ecc71;
    border:1.5px solid #27ae60;
    border-radius:4px;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:all .2s;
    padding:6px 2px;
    position:relative;
    overflow:hidden;
    user-select:none;
    -webkit-user-select: none; /* Tắt chọn chữ trên Safari */
    user-select: none;
    -webkit-touch-callout: none; /* Tắt menu nhấn giữ trên iPhone */
    touch-action: none; /* Ngăn trình duyệt can thiệp vào cử chỉ */
}

.parking-spot.booked{
    background:#e74c3c !important;
    border-color:#c0392b !important;
}

.parking-spot.staff{
    background:#f39c12 !important;
    border-color:#e67e22 !important;
}

.parking-spot.handicapped{
    background:#3498db;
    border-color:#2980b9;
}

.name-display {
    writing-mode: vertical-rl;
    text-orientation: upright;
    
    /* Chỉnh cỡ chữ tự động thu nhỏ trên iPad */
    font-size: clamp(14px, 1.8vh, 14px); 
    
    margin-top: 5px;
    height: 85%;
    width: 90%;
    background: rgba(255, 255, 255, .2);
    border-radius: 3px;
    padding: 2px;
    font-weight: bold;
    color: #fff;

    /* CẤU HÌNH KHÓA 1 HÀNG DỌC */
    display: flex;
    flex-direction: column;   /* Ép các ký tự xếp theo cột dọc */
    justify-content: center;
    align-items: center;
    
    white-space: nowrap;      /* TUYỆT ĐỐI không cho xuống hàng */
    overflow: hidden;         /* Ẩn phần dư nếu tên quá dài */
    text-overflow: clip;      /* Cắt bỏ phần thừa để không đẩy khung */
    
    box-sizing: border-box;
    pointer-events: none;     /* Để không cản trở việc kéo thả trên iPad */
}



.hatched-zone{
    grid-column:4;
    grid-row:1 / span 3;
    background-image:repeating-linear-gradient(
        45deg,
        #f9f9f9,
        #f9f9f9 5px,
        #eee 5px,
        #eee 10px
    );
    border:1px solid #eee;
}

.short-rect{
    grid-row:1 / span 3;
}

#spot-1{grid-column:1;}
#spot-2{grid-column:2;}
#spot-3{grid-column:3;}

#spot-4{
    grid-column:5 / span 1;
    grid-row:1 / span 3;
}

.top-row-spot{
    grid-row:1;
}

#spot-5{grid-column:6;}
#spot-6{grid-column:7;}
#spot-7{grid-column:8;}
#spot-8{grid-column:9;}
#spot-9{grid-column:10;}

.main-road{
    grid-row:4;
    grid-column:1 / span 19;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ccc;
    font-size:11px;
    letter-spacing:5px;
}

#spot-21{grid-row:5;grid-column:17;}
#spot-20{grid-row:5;grid-column:18;}
#spot-19{grid-row:5;grid-column:19;}

.legend{
    margin-top:25px;
    display:flex;
    gap:40px;
    padding:15px 40px;
    background:#fff;
    border-radius:10px;
    border:1px solid #eee;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:12px;
}

.color-box{
    width:24px;
    height:24px;
    border-radius:4px;
}

#toast{
    position:fixed;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    background:#34495e;
    color:white;
    padding:12px 30px;
    border-radius:50px;
    transition:top .5s ease;
    z-index:2000;
}

#toast.show{
    top:20px;
}

/* ================= MODAL ================= */

#guestModal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:5000;
}

/* Khung Modal chính */
.modal-box {
    background: #fff;
    width: 450px;
    max-width: 90vw; /* Tự co giãn theo màn hình iPad */
    border-radius: 12px;
    padding: 30px;
    box-sizing: border-box;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Hàng chứa nhiều ô nhập liệu */
.form-row {
    display: flex;
    gap: 15px; /* Tăng khoảng cách giữa các ô */
    margin-bottom: 15px;
    align-items: flex-end;
}

/* Từng nhóm nhãn và ô nhập */
.form-group {
    flex: 1; /* Chia đều không gian */
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
    font-weight: bold;
}

/* Thiết kế lại ô nhập liệu cho iOS mượt hơn */
.form-group input, 
.form-group select, 
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    background-color: #fcfcfc;
    -webkit-appearance: none; /* Tắt giao diện mặc định của iOS */
    box-sizing: border-box;
    color: #333;
}

/* Cố định tỷ lệ các ô đặc biệt để không bị lệch */
.room-small {
    flex: 0 0 100px !important; /* Khóa chiều rộng ô phòng */
}

.stay-small {
    flex: 0 0 90px !important; /* Khóa chiều rộng ô số đêm */
}

.check-large {
    flex: 1;
}

/* Chỉnh riêng cho ô Date trên iPad để không bị hiện icon lạ */
input[type="date"] {
    position: relative;
    min-height: 45px;
}

/* Nút bấm trong Modal */
.modal-buttons {
    margin-top: 25px;
    display: flex;
    gap: 10px;
}

.modal-buttons button {
    height: 48px;
    font-weight: bold;
    letter-spacing: 1px;
}

.btn-save{
    background:#2ecc71;
    color:white;
}

.btn-close{
    background:#95a5a6;
    color:white;
}

.btn-delete{
    background:#e74c3c;
    color:white;
}

</style>
</head>

<body>

<div id="toast">通知</div>

<div style="display:flex;align-items:center;gap:8px;">

    
<div class="main-title">駐車場</div>

</div>
<div class="date-controls">
               <button onclick="changeDate(-1)">◀</button>

        <input
            type="date"
            id="parkingDate"
            onchange="handleDateChange()"
        >

        <button onclick="changeDate(1)">▶</button>

<button onclick="exportToExcel()" class="pdf-btn"
    style="background:#2980b9 !important;    color: #fff;">
    EXCEL
</button>
<input
    type="file"
    id="excelTemplate"
    accept=".xlsx"
    style="display:none"
>
<button onclick="refreshParkingData()"
    style="background:#2980b9;color:white;">
    🔄 更新
</button>
    </div>



<div class="parking-lot-map">
    <div class="grid-container" id="parkingGrid"></div>
</div>

<div class="legend">
    <div class="legend-item">
        <div class="color-box" style="background:#2ecc71;"></div>
        空き
    </div>

    <div class="legend-item">
        <div class="color-box" style="background:#e74c3c;"></div>
        予約済
    </div>

    <div class="legend-item">
        <div class="color-box" style="background:#f39c12;"></div>
        スタッフ用&予備
    </div>

    <div class="legend-item">
        <div class="color-box" style="background:#3498db;"></div>
        身障者用
    </div>
</div>

<!-- ================= GUEST MODAL ================= -->

<div id="guestModal">

    <div class="modal-box">

        <div class="modal-title" id="guestModalTitle">
    駐車情報
</div>

<!-- HÀNG 1 -->
<div class="form-row">

    <div class="form-group room-small">
        <label>部屋番号</label>
        <input type="text" id="roomNumber">
    </div>

    <div class="form-group">
        <label>お客様名</label>
        <input type="text" id="guestName">
    </div>

</div>

<!-- HÀNG 2 -->
<!-- HÀNG 2: Check-in, Check-out, Số đêm -->
<div class="form-row">
    <div class="form-group check-large">
        <label>チェックイン</label>
        <input type="date" id="checkIn" onchange="calculateStayDays()">
    </div>

    <div class="form-group check-large">
        <label>チェックアウト</label>
        <input type="date" id="checkOut" onchange="calculateStayDays()">
    </div>

    <div class="form-group stay-small">
        <label>泊数</label>
        <select id="stayDays" onchange="updateCheckOutFromStay()"></select>
    </div>
</div>

<!-- HÀNG 3 -->
<div class="form-group">
    <label>車両番号</label>
    <input type="text" id="carNumber">
</div>

<!-- HÀNG 4 -->
<div class="form-group">
    <label>メモ</label>

    <textarea
        id="guestNote"
        rows="2"
        placeholder="メモ入力..."
    ></textarea>
</div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveGuestInfo()">
                保存
            </button>

            <button class="btn-delete" onclick="deleteGuestInfo()">
                削除
            </button>

            <button class="btn-close" onclick="closeGuestModal()">
                閉じる
            </button>
        </div>

    </div>

</div>
<!-- ================= STAFF MODAL (NEW) ================= -->
<div id="staffModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); display:none; justify-content:center; align-items:center; z-index:5001;">
    <div class="modal-box">
        <div class="modal-title" id="staffModalTitle" style="color: #f39c12;">スタッフ / 予備</div>
        
         <div class="form-group">
            <label>スタッフ名 or 予備</label>
            <input type="text" id="staffName" placeholder="名前を入力" list="staffOptions">

        <datalist id="staffOptions">
        <option value="スタッフ">
        <option value="予備">
        <option value="返却">
        <option value="押さえ">
    </datalist>
        </div>


        <div class="modal-buttons">
            <button class="btn-save" style="background:#f39c12;" onclick="saveStaffInfo()">保存</button>
            <button class="btn-delete" onclick="deleteStaffInfo()">削除</button>
            <button class="btn-close" onclick="closeStaffModal()">閉じる</button>
        </div>
    </div>
</div>
<!-- ================= DELETE CONFIRM MODAL ================= -->
<div id="confirmModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); display:none; justify-content:center; align-items:center; z-index:6000;">
    <div class="modal-box" style="width: 320px; text-align: center;">
        <div style="font-size: 50px; color: #e74c3c; margin-bottom: 10px;">⚠️</div>
        <div class="modal-title" style="margin-bottom: 20px;">本当に削除しますか？<br><small></div>
        <div class="modal-buttons">
            <button class="btn-delete" onclick="executeDelete()">はい</button>
            <button class="btn-close" onclick="closeConfirmModal()">いいえ</button>
        </div>
    </div>
</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyCWV0CdSSDznxXKdlTbJc4-AMrjVr51Hlo",

  authDomain: "test-f20cf.firebaseapp.com",

  databaseURL: "https://test-f20cf-default-rtdb.asia-southeast1.firebasedatabase.app/",

  projectId: "test-f20cf",

  storageBucket: "test-f20cf.firebasestorage.app",

  messagingSenderId: "985197427209",

  appId: "1:985197427209:web:0c6f69a8c9b62cb67bd6d8",

  measurementId: "G-1TG9CNC3Y1"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ================= SPOT CONFIG ================= */

const spotConfig = [

    { id:1, type:'short-rect' },
    { id:2, type:'short-rect' },
    { id:3, type:'short-rect' },

    { id:4, type:'handicapped' },

    { id:5, type:'top-row-spot' },
    { id:6, type:'top-row-spot' },
    { id:7, type:'top-row-spot' },
    { id:8, type:'top-row-spot' },
    { id:9, type:'top-row-spot' },

    { id:10, type:'short-rect' },
    { id:11, type:'short-rect' },
    { id:12, type:'short-rect' },
    { id:13, type:'short-rect' },
    { id:14, type:'short-rect' },
    { id:15, type:'short-rect' },
    { id:16, type:'short-rect' },
    { id:17, type:'short-rect' },
    { id:18, type:'short-rect' },

    { id:21, type:'normal' },
    { id:20, type:'normal' },
    { id:19, type:'normal' }

];

let currentSpot = null;

/* ================= ONLOAD ================= */

window.onload = function(){
const staySelect =
    document.getElementById('stayDays');

for(let i = 1; i <= 30; i++){

    const option =
        document.createElement('option');

    option.value = i;

    option.textContent = `${i}泊`;

    staySelect.appendChild(option);
}

    const dInput = document.getElementById('parkingDate');

    // Luôn lấy ngày hôm nay (theo giờ hệ thống)
   // Luôn lấy ngày hôm nay (theo giờ hệ thống)
const today = formatDateLocal(new Date());

dInput.value = today;

    // Cập nhật lại localStorage để các hàm khác đồng bộ
    localStorage.setItem('parking_last_visited_date', today);

    renderMap();

    loadParkingData();

};
function formatDateLocal(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');

    return `${y}-${m}-${d}`;
}	

/* ================= CORE FUNCTIONS ================= */
function renderMap(){
    const grid = document.getElementById('parkingGrid');
    grid.innerHTML = "";

    const hatch = document.createElement('div'); hatch.className = 'hatched-zone'; grid.appendChild(hatch);
    const road = document.createElement('div'); road.className = 'main-road'; road.innerText = 'entrance'; grid.appendChild(road);

    spotConfig.forEach(spot=>{
        const div = document.createElement('div');
    div.className = `parking-spot ${spot.type}`;
    div.id = `spot-${spot.id}`;
    div.setAttribute('data-num', spot.id); // Đảm bảo luôn có data-num là số 4
    // QUAN TRỌNG: Phải có draggable="true" thì mới kéo được
        div.draggable = true;
    // Sửa phần hiển thị để không làm mất số 4 khi ghi đè
    const displayNum = spot.id === 4 ? '♿ 4' : spot.id;
    div.innerHTML = `<div>${displayNum}</div><div class="name-display"></div>`;

        let clickTimer = null;
        div.onclick = (e) => {
            if (clickTimer) {
                clearTimeout(clickTimer); clickTimer = null;
                openStaffModal(div);
            } else {
                clickTimer = setTimeout(() => {
                    openGuestModal(div); clickTimer = null;
                }, 250);
            }
        };
        // SỰ KIỆN KÉO THẢ (DRAG & DROP)
        div.addEventListener('dragstart', handleDragStart);
        div.addEventListener('dragover', handleDragOver);
        div.addEventListener('dragleave', handleDragLeave);
        div.addEventListener('drop', handleDrop);
        div.addEventListener('dragend', handleDragEnd);
    

    // THÊM: Sự kiện cảm ứng (iPad/iPhone)
    div.addEventListener('touchstart', handleTouchStart, {passive: false});
    div.addEventListener('touchmove', handleTouchMove, {passive: false});
    div.addEventListener('touchend', handleTouchEnd, {passive: false});
        
        grid.appendChild(div);
    });
}

let draggedSpotNum = null;

// Bắt đầu kéo
function handleDragStart(e) {
    // Chỉ cho phép kéo nếu ô đó có dữ liệu (đã đặt hoặc là staff)
    const isBooked = this.classList.contains('booked');
    const isStaff = this.classList.contains('staff');

    if (!isBooked && !isStaff) {
        e.preventDefault();
        return;
    }

    draggedSpotNum = this.getAttribute('data-num');
    this.classList.add('dragging');

    // Thiết lập dữ liệu và hiệu ứng kéo
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedSpotNum);
}

// Khi ô đang được kéo đè lên ô khác
function handleDragOver(e) {
    e.preventDefault(); // Cần thiết để cho phép Drop
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
}

// Khi kéo ra khỏi phạm vi một ô
function handleDragLeave() {
    this.classList.remove('drag-over');
}

// Kết thúc kéo (dù thành công hay không)
function handleDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.parking-spot').forEach(el => {
        el.classList.remove('drag-over', 'dragging');
    });
}

// Xử lý khi thả chuột (Drop)
async function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');

    const fromSpotNum = e.dataTransfer.getData('text/plain');
    const toSpotNum = this.getAttribute('data-num');

    // Nếu thả cùng một chỗ thì không làm gì
    if (!fromSpotNum || fromSpotNum === toSpotNum) return;

    const date = document.getElementById('parkingDate').value;
    const fromRef = db.ref(`parking/${date}/${fromSpotNum}`);
    const toRef = db.ref(`parking/${date}/${toSpotNum}`);

    try {
        // 1. Lấy dữ liệu ô gốc
        const snapshotFrom = await fromRef.once('value');
        const dataFrom = snapshotFrom.val();
        if (!dataFrom) return;

        // 2. Kiểm tra ô đích
        const snapshotTo = await toRef.once('value');
        const dataTo = snapshotTo.val();

        if (dataTo) {
            // Nếu ô đích có dữ liệu -> Hỏi để hoán đổi (Swap)
            const confirmSwap = confirm(`番号 ${toSpotNum} には既にデータがあります。入れ替えますか？\n(Ô ${toSpotNum} đã có dữ liệu, bạn muốn đổi chỗ không?)`);
            if (!confirmSwap) return;

            // Thực hiện đổi chỗ
            await toRef.set(dataFrom);
            await fromRef.set(dataTo);
            showToast(`番号 ${fromSpotNum} と ${toSpotNum} を入れ替えました`);
        } else {
            // Nếu ô đích trống -> Di chuyển và xóa ô cũ
            await toRef.set(dataFrom);
            await fromRef.remove();
            showToast(`番号 ${fromSpotNum} から ${toSpotNum} へ移動しました`);
        }

        // loadParkingData() sẽ tự động cập nhật nhờ sự kiện .on('value') đã thiết lập trước đó
    } catch (error) {
        console.error("DragDrop Error:", error);
        showToast("移動に失敗しました (Lỗi khi di chuyển)");
    }
}

    // Hỗ trợ kéo thả cho iPad/iPhone (Touch Events)
let currentDragElement = null;
let touchDragData = null;

function handleTouchStart(e) {
    // Chỉ kéo nếu là ô có dữ liệu
    if (!this.classList.contains('booked') && !this.classList.contains('staff')) return;

    // iPad đôi khi cần ngăn chặn sự kiện mặc định ngay từ lúc chạm
    // e.preventDefault(); // Nếu bật dòng này mà không click được thì hãy tắt đi

    currentDragElement = this;
    touchDragData = this.getAttribute('data-num');
    this.classList.add('dragging');
}

function handleTouchMove(e) {
    if (!currentDragElement) return;

    // iPadOS bắt buộc phải có preventDefault trong touchmove để không cuộn trang
    if (e.cancelable) e.preventDefault(); 

    const touch = e.touches[0];
    
    // Sử dụng tọa độ chuẩn để tìm phần tử bên dưới ngón tay trên màn hình lớn của iPad
    const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
    
    // Tìm ô bãi xe gần nhất từ điểm chạm
    const dropTarget = targetEl ? targetEl.closest('.parking-spot') : null;

    // Hiệu ứng di chuyển
    document.querySelectorAll('.parking-spot').forEach(el => el.classList.remove('drag-over'));
    if (dropTarget && dropTarget !== currentDragElement) {
        dropTarget.classList.add('drag-over');
    }
}

async function handleTouchEnd(e) {
    if (!currentDragElement) return;

    const touch = e.changedTouches[0];
    const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
    const dropTarget = targetEl ? targetEl.closest('.parking-spot') : null;

    const fromNum = touchDragData;
    
    // Xóa hiệu ứng ngay lập tức
    currentDragElement.classList.remove('dragging');
    document.querySelectorAll('.parking-spot').forEach(el => el.classList.remove('drag-over'));

    if (dropTarget && fromNum && fromNum !== dropTarget.getAttribute('data-num')) {
        // Chạy logic đổi chỗ
        const fakeEvent = {
            preventDefault: () => {},
            dataTransfer: { getData: () => fromNum }
        };
        handleDrop.call(dropTarget, fakeEvent);
    }

    // Reset
    currentDragElement = null;
    touchDragData = null;
}
    
function loadParkingData(){

    const date = document.getElementById('parkingDate').value;

    db.ref('parking/' + date).off();

    db.ref('parking/' + date).on('value', (snapshot) => {

        const data = snapshot.val();

        document.querySelectorAll('.parking-spot').forEach(el => {

            el.classList.remove('booked', 'staff');

            el.querySelector('.name-display').innerText = "";

            el.dataset.info = "";

            if(data && data[el.dataset.num]){

                const spotData = data[el.dataset.num];

                if(spotData.status === 'booked')
                    el.classList.add('booked');

                else if(spotData.status === 'staff')
                    el.classList.add('staff');

                if(spotData.info){

                    el.dataset.info = JSON.stringify(spotData.info);

                    el.querySelector('.name-display').innerText =
                        spotData.info.carNumber || "";
                }
            }
        });
    });
}/* ================= next day================= */

/* ================= TỰ ĐỘNG TÍNH SỐ ĐÊM ================= */
// Khi thay đổi Số đêm -> Tự động tính lại ngày Check-out
function updateCheckOutFromStay() {
    const checkInVal = document.getElementById('checkIn').value;
    const stayDays = parseInt(document.getElementById('stayDays').value);
    const checkOutInput = document.getElementById('checkOut');

    if (checkInVal && stayDays) {
        const startDate = new Date(checkInVal);
        // Cộng thêm số ngày
        startDate.setDate(startDate.getDate() + stayDays);
        
        // Cập nhật vào ô Check-out
        checkOutInput.value = formatDateLocal(startDate);
    }
}

// Cập nhật lại hàm calculateStayDays hiện có của bạn để khi chọn ngày thủ công 
// thì ô "Số đêm" cũng được cập nhật chính xác (Đồng bộ 2 chiều)
function calculateStayDays() {
    const checkInVal = document.getElementById('checkIn').value;
    const checkOutVal = document.getElementById('checkOut').value;
    const stayDaysSelect = document.getElementById('stayDays');

    if (checkInVal && checkOutVal) {
        const start = new Date(checkInVal);
        const end = new Date(checkOutVal);
        const diffTime = end - start;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays > 0) {
            stayDaysSelect.value = diffDays;
        } else {
            stayDaysSelect.value = 1; // Mặc định tối thiểu 1 đêm
        }
    }
}

/* ================= SAVE INFO ================= */

async function saveGuestInfo(){
    if(!currentSpot) return;

    const roomNumber = document.getElementById('roomNumber').value;
    const guestName = document.getElementById('guestName').value;
    const stayDays = parseInt(document.getElementById('stayDays').value) || 1;
    const carNumber = document.getElementById('carNumber').value;
    const guestNote = document.getElementById('guestNote').value;

    const originalCheckIn = document.getElementById('checkIn').value;
    const checkOut = document.getElementById('checkOut').value;
    // Dùng getAttribute để lấy số 4 chính xác nhất
    const spotNum = currentSpot.getAttribute('data-num');

    // Vòng lặp lưu dữ liệu cho tất cả các ngày
    for(let i = 0; i < stayDays; i++){
        const targetDate = new Date(originalCheckIn);
        targetDate.setDate(targetDate.getDate() + i);
        const dateKey = formatDateLocal(targetDate);

        // Luôn lưu TỔNG số đêm (stayDays) vào từng ngày, không dùng remainDays
        const info = {
            roomNumber,
            guestName,
            checkIn: originalCheckIn,
            checkOut,
            stayDays: stayDays, 
            carNumber,
            guestNote
        };

        await db.ref(`parking/${dateKey}/${spotNum}`).set({
            status:'booked',
            info:info
        });
    }

    // Cập nhật hiển thị tức thì trên giao diện
    currentSpot.dataset.info = JSON.stringify({
        roomNumber, guestName, checkIn: originalCheckIn, checkOut, stayDays, carNumber, guestNote
    });

    currentSpot.classList.add('booked');
    currentSpot.querySelector('.name-display').innerText = carNumber || "";

    closeGuestModal();
    showToast("宿泊データを保存しました");
    loadParkingData();
}

/* ================= EXECUTE DELETE (XÓA TOÀN BỘ CHUỖI NGÀY) ================= */
/* ================= THAY THẾ BẰNG ĐOẠN NÀY ================= */
async function executeDelete() {
    if (!currentSpot) return;

    // Lấy số ô (data-num) để đảm bảo ô số 4 vẫn nhận diện được
    const spotNum = currentSpot.getAttribute('data-num'); 
    const dataInfo = currentSpot.dataset.info ? JSON.parse(currentSpot.dataset.info) : null;

    try {
        // Nếu có thông tin check-in/out thì xóa toàn bộ chuỗi ngày
        if (dataInfo && dataInfo.checkIn && dataInfo.checkOut) {
            const start = new Date(dataInfo.checkIn);
            const end = new Date(dataInfo.checkOut);
            let currentDate = new Date(start);
            
            while (currentDate < end) {
                const dateKey =  formatDateLocal(currentDate);
                await db.ref(`parking/${dateKey}/${spotNum}`).remove();
                currentDate.setDate(currentDate.getDate() + 1);
            }
        } else {
            // Nếu không có info (hoặc là staff), chỉ xóa ngày hiện tại
            const date = document.getElementById('parkingDate').value;
            await db.ref(`parking/${date}/${spotNum}`).remove();
        }

        // Đóng các modal
        closeConfirmModal();
        closeGuestModal();
        if (window.closeStaffModal) closeStaffModal();
        
        showToast("連泊分を含めて削除完了");
        
        // Load lại dữ liệu để cập nhật màu sắc
        loadParkingData();

    } catch (error) {
        console.error("Delete Error:", error);
        showToast("削除 lỗi (Thất bại)");
    }
}

/* ================= SAVE FIREBASE ================= */

function saveParkingData(){

    const date =
        document.getElementById('parkingDate').value;

    const data = {};

    document.querySelectorAll('.parking-spot').forEach(spot=>{

        const num = spot.dataset.num;

        data[num] = {

           status:
    spot.classList.contains('booked')
        ? 'booked'
        : spot.classList.contains('staff')
            ? 'staff'
            : 'empty',

            info: spot.dataset.info
                ? JSON.parse(spot.dataset.info)
                : {}

        };

    });

    db.ref('parking/' + date).set(data);

}

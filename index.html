        // ===== POPUP LỊCH SỬ SỬA / XÓA =====
        let _currentLogTab = 'edit';

        function openLogPopup() {
            document.getElementById('logPopupOverlay').style.display = 'block';
            document.getElementById('logPopup').style.display = 'flex';
            const pad = n => String(n).padStart(2, '0');
            const toDateStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

            const sel = document.getElementById('logDateFilter');
            sel.innerHTML = '';
            const today = new Date();
            for (let i = 0; i < 3; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const val = toDateStr(d);
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = i === 0 ? `${val}（今日）`
                                : i === 1 ? `${val}（昨日）`
                                : val;
                if (i === 0) opt.selected = true;
                sel.appendChild(opt);
            }
            loadLogData();
        }

        // Dọn log cũ hơn 3 ngày ngầm khi app load (không cần mở popup)
        function silentCleanupLogs() {
            if (!navigator.onLine) return;
            const cutoff = Date.now() - 3 * 24 * 60 * 60 * 1000;
            ['edit_log', 'delete_log'].forEach(node => {
                db.ref(node).once('value').then(snap => {
                    const data = snap.val();
                    if (!data) return;
                    const updates = {};
                    Object.entries(data).forEach(([dateKey, entries]) => {
                        if (!entries) return;
                        Object.entries(entries).forEach(([logKey]) => {
                            const m = logKey.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
                            if (m) {
                                const t = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]).getTime();
                                if (t < cutoff) updates[`${dateKey}/${logKey}`] = null;
                            }
                        });
                    });
                    if (Object.keys(updates).length > 0) {
                        db.ref(node).update(updates).catch(() => {});
                    }
                }).catch(() => {});
            });
        }

        function closeLogPopup() {
            document.getElementById('logPopupOverlay').style.display = 'none';
            document.getElementById('logPopup').style.display = 'none';
        }

        function switchLogTab(tab) {
            _currentLogTab = tab;
            const editBtn   = document.getElementById('logTabEdit');
            const deleteBtn = document.getElementById('logTabDelete');
            if (tab === 'edit') {
                editBtn.style.color = '#1a6ddb'; editBtn.style.borderBottom = '2px solid #1a6ddb';
                deleteBtn.style.color = '#aaa';  deleteBtn.style.borderBottom = '2px solid transparent';
            } else {
                deleteBtn.style.color = '#e74c3c'; deleteBtn.style.borderBottom = '2px solid #e74c3c';
                editBtn.style.color = '#aaa';      editBtn.style.borderBottom = '2px solid transparent';
            }
            loadLogData();
        }

        async function loadLogData() {
            const dateKey = document.getElementById('logDateFilter').value;
            const node = _currentLogTab === 'edit' ? 'edit_log' : 'delete_log';
            const content = document.getElementById('logContent');
            content.innerHTML = '<div style="text-align:center;color:#aaa;padding:30px;font-size:14px;">読み込み中...</div>';

            try {
                const snap = await db.ref(`${node}/${dateKey}`).once('value');
                const data = snap.val();
                if (!data) {
                    content.innerHTML = '<div style="text-align:center;color:#aaa;padding:30px;font-size:14px;">履歴がありません</div>';
                    return;
                }
                // Sắp xếp mới nhất trước, chỉ giữ entries trong vòng 3 ngày
                const cutoff24h = Date.now() - 3 * 24 * 60 * 60 * 1000;
                const entries = Object.entries(data)
                    .filter(([key]) => {
                        const m = key.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
                        if (!m) return true;
                        const t = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]).getTime();
                        return t >= cutoff24h;
                    })
                    .sort((a, b) => b[0].localeCompare(a[0]));
                content.innerHTML = '';
                entries.forEach(([key, entry]) => {
                    const card = document.createElement('div');
                    card.style.cssText = 'border:1px solid #f0f0f0; border-radius:10px; padding:12px 14px; margin-bottom:10px; background:#fafafa;';

                    const timeStr = entry.edited_at || entry.deleted_at || '';
                    const spotId  = entry.spot_id || '';
                    const parkingDate = entry.date_key || '';
                    const isDelete = _currentLogTab === 'delete';

                    // Lấy thông tin hiển thị
                    const afterInfo  = entry.after?.info  || null;
                    const beforeInfo = entry.before?.info || null;
                    const showInfo   = isDelete ? (entry.data?.info || null) : afterInfo;
                    const room = showInfo?.roomNumber ? `R${showInfo.roomNumber}` : '';
                    const name = showInfo?.guestName  || '';
                    const car  = showInfo?.carNumber  || '';

                    let diffHtml = '';
                    if (!isDelete && beforeInfo && afterInfo) {
                        const fields = [
                            { label: '部屋', before: beforeInfo.roomNumber, after: afterInfo.roomNumber },
                            { label: 'お客様名', before: beforeInfo.guestName, after: afterInfo.guestName },
                            { label: '車番', before: beforeInfo.carNumber, after: afterInfo.carNumber },
                            { label: 'チェックイン', before: beforeInfo.checkIn, after: afterInfo.checkIn },
                            { label: 'チェックアウト', before: beforeInfo.checkOut, after: afterInfo.checkOut },
                            { label: 'メモ', before: beforeInfo.guestNote, after: afterInfo.guestNote },
                        ];
                        const changed = fields.filter(f => (f.before || '') !== (f.after || ''));
                        if (changed.length > 0) {
                            diffHtml = '<div style="margin-top:8px; font-size:12px; line-height:1.8;">';
                            changed.forEach(f => {
                                diffHtml += `<div><span style="color:#888;">${f.label}：</span>
                                    <span style="color:#e74c3c; text-decoration:line-through;">${f.before || 'ー'}</span>
                                    <span style="color:#888; margin:0 4px;">→</span>
                                    <span style="color:#27ae60; font-weight:600;">${f.after || 'ー'}</span></div>`;
                            });
                            diffHtml += '</div>';
                        }
                    }

                    const restoreData = isDelete
                        ? entry.data
                        : entry.before;

                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
                            <div style="flex:1;">
                                <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
                                    <span style="background:${isDelete?'#e74c3c':'#1a6ddb'}; color:#fff; font-weight:800; font-size:14px;
                                        padding:2px 9px; border-radius:6px;">🅿️ ${spotId}</span>
                                    <span style="font-size:12px; color:#aaa;">${timeStr}</span>
                                </div>
                                ${parkingDate ? `<div style="font-size:11px; color:#aaa; margin-bottom:3px;">🗓 駐車日：${parkingDate}</div>` : ''}
                                <div style="font-size:15px; font-weight:700; color:#1d1d1f;">${name || 'ー'}</div>
                                <div style="font-size:13px; color:#666; margin-top:2px;">${room}　${car}</div>
                                ${diffHtml}
                            </div>
                            ${restoreData ? `<button onclick='restoreData(${JSON.stringify(entry.date_key)}, ${JSON.stringify(String(spotId))}, ${JSON.stringify(restoreData)})'
                                style="flex-shrink:0; background:#f39c12; color:#fff; border:none; border-radius:8px;
                                padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap;">
                                🔄 復元
                            </button>` : ''}
                        </div>
                    `;
                    content.appendChild(card);
                });
            } catch(e) {
                content.innerHTML = `<div style="text-align:center;color:#e74c3c;padding:30px;font-size:13px;">読み込みエラー: ${e.message}</div>`;
            }
        }

        async function restoreData(dateKey, spotNum, data) {
            if (!data || !data.status) return;
            const name = data.info?.guestName || '';
            const room = data.info?.roomNumber ? `R${data.info.roomNumber}` : '';
            if (!confirm(`🅿️ ${spotNum}番 のデータを復元しますか？\n\n${room} ${name}`)) return;
            try {
                const restorePayload = {
                    status: data.status,
                    info: data.info || {}
                };
                await db.ref(`parking/${dateKey}/${spotNum}`).set(restorePayload);
                const nowJST = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
                const pad = n => String(n).padStart(2, '0');
                const logKey = `${nowJST.getFullYear()}${pad(nowJST.getMonth()+1)}${pad(nowJST.getDate())}_${pad(nowJST.getHours())}${pad(nowJST.getMinutes())}${pad(nowJST.getSeconds())}_spot${spotNum}`;
                db.ref(`edit_log/${dateKey}/${logKey}`).set({
                    edited_at: `${nowJST.getFullYear()}/${pad(nowJST.getMonth()+1)}/${pad(nowJST.getDate())} ${pad(nowJST.getHours())}:${pad(nowJST.getMinutes())}:${pad(nowJST.getSeconds())}`,
                    date_key: dateKey, spot_id: parseInt(spotNum),
                    before: null, after: restorePayload, note: '復元'
                }).catch(()=>{});
                showToast(`🅿️ ${spotNum}番 復元完了`);
                closeLogPopup();
            } catch(e) {
                alert('復元に失敗しました: ' + e.message);
            }
        }
    </script>
</body>
</html>
